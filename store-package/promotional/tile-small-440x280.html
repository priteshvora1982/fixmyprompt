<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width:440px; height:280px; overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background: linear-gradient(135deg, #1a1033 0%, #2d1b69 50%, #1a3a5c 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:32px;
    position:relative;
  }
  .glow {
    position:absolute; width:300px; height:300px; border-radius:50%;
    background:radial-gradient(circle, rgba(102,126,234,0.3) 0%, transparent 70%);
    top:50%; left:50%; transform:translate(-50%,-50%);
    pointer-events:none;
  }
  .emoji { font-size:40px; margin-bottom:12px; position:relative; z-index:2; }
  h1 {
    font-size:26px; font-weight:900; line-height:1.2; letter-spacing:-0.02em;
    color:white; margin-bottom:10px; position:relative; z-index:2;
  }
  h1 span {
    background:linear-gradient(135deg,#a78bfa,#818cf8);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  p {
    font-size:13px; color:rgba(255,255,255,0.65); line-height:1.5;
    position:relative; z-index:2;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="emoji">✨</div>
  <h1>Fix My<span>Prompt</span></h1>
  <p>Instantly better AI prompts<br>on ChatGPT & Claude. Free.</p>
</body>
</html>
